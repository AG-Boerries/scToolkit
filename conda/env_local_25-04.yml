name: scToolkit_25_04_latest
channels:
  - rapidsai
  - nvidia
  - conda-forge
  - bioconda
dependencies:
  - rapids=25.04
  - python=3.12.10
  - cuda-version=12.8
  - cudnn
  - cutensor
  - cusparselt
  - leidenalg
  - jupyterlab
  - numba=0.60.0
  - numpy=1.26.4
  - pip
  - pip:
      # Single-cell analysis
      - decoupler==1.8.0
      - anndata==0.11.4
      - scanpy==1.11.1
      - omnipath==1.0.9
      - harmonypy
      - rapids-singlecell==0.12.4
      - muon==0.1.7
      - anndata2ri

      # Download utilities
      - gdown
      - wget
      - rapidgzip

      # Visualization / Dash / Plotly ecosystem
      - plotly
      - kaleido
      - dash-daq
      - dash-bootstrap-components

      # Math / Stats / ML
      - scikit-misc
      - scikit-learn-extra
      - KDEpy
      - numba-stats

      # R interoperability
      - rpy2==3.5.16

      # Excel / IO
      - openpyxl

      # Plotting
      - distinctipy
      - marsilea==0.5.4
      - legendkit